name: Follow-up Reminders

on:
  schedule:
    # Every day at 11:00 UTC (13:00 Budapest) — after the morning pipeline
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  followup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Send follow-up reminders
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: node agents/followup.js

      - name: Commit campaign updates
        run: |
          git config user.name "Pixel & Co. Bot"
          git config user.email "tamerlan858@gmail.com"
          git add database/
          git diff --staged --quiet || git commit -m "Follow-up reminders $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push
